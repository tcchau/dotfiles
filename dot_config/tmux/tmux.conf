set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

set -g prefix ^A
set -g prefix2 'C-\'
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "${TERM}"
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Consolidated keybindings (previously in tmux.reset.conf)
# First remove *all* keybindings
# unbind-key -a
# Now reinsert all the regular tmux keys
bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach
bind * list-clients

bind -N "Switch to previous window" H previous-window
bind -N "Switch to next window" L next-window

bind -N "Rename the current window" r command-prompt "rename-window %%"
bind -N "Jump to last window" ^A last-window
bind ^W list-windows
bind -N "List windows in current session" w list-windows
bind z resize-pane -Z
bind ^L refresh-client
bind l refresh-client
bind -N "Split window vertically" | split-window
bind -N "Split window horizontally" s split-window -v -c "#{pane_current_path}"
bind -N "Split window vertically" v split-window -h -c "#{pane_current_path}"
bind -N "Choose window to jump to across all sessions" '"' choose-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7
bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status
bind c kill-pane
bind x swap-pane -D
bind -N "Choose session to jump to" S choose-session
bind -N "Reload configuration" R source-file ~/.config/tmux/tmux.conf
bind K send-keys "clear"\; send-keys "Enter"
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Select windows with Command/Meta + number (no prefix)
bind -n M-1 select-window -t:=1
bind -n M-2 select-window -t:=2
bind -n M-3 select-window -t:=3
bind -n M-4 select-window -t:=4
bind -n M-5 select-window -t:=5
bind -n M-6 select-window -t:=6
bind -n M-7 select-window -t:=7
bind -n M-8 select-window -t:=8
bind -n M-9 select-window -t:=9

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/catppuccin-tmux' # My fork that holds the meetings script bc I'm lazy af
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
# set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
# set -g @catppuccin_date_time_text "%H:%M"

# Make mouse wheel activate on current mouse-enabled app
# or the scrollback buffer in tmux
set -g mouse on
unbind -n WheelUpPane
unbind -n WheelDownPane
bind -n WheelUpPane if -F '#{&&:#{alternate_on},#{mouse_any_flag}}' \
  'send-keys -M' \
  'if -F "#{pane_in_mode}" "send-keys -X scroll-up" "copy-mode -e; send-keys -X scroll-up"'
bind -n WheelDownPane if -F '#{&&:#{alternate_on},#{mouse_any_flag}}' \
  'send-keys -M' \
  'if -F "#{pane_in_mode}" "send-keys -X scroll-down" "send-keys -X scroll-down"'
  
run '$HOME/.tmux/plugins/tpm/tpm'
